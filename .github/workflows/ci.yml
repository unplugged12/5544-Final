name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  data-integrity:
    name: Data Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install test deps
        run: pip install pytest
      - name: Run data tests
        run: pytest data/tests/ -v

  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: data-integrity
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-asyncio httpx
      - name: Seed test data
        run: |
          pip install -r data/requirements.txt
          python data/ingest.py
      - name: Run backend tests
        working-directory: backend
        env:
          SQLITE_PATH: ../data/copilot.db
          CHROMA_PERSIST_DIR: ../data/chroma
          OPENAI_API_KEY: sk-test-not-real
          ANTHROPIC_API_KEY: sk-ant-test-not-real
        run: pytest tests/ -v

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci || npm install
      - name: Build
        working-directory: frontend
        run: npm run build

  bot-lint:
    name: Bot Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r bot/requirements.txt
      - name: Syntax check
        run: python -m py_compile bot/main.py && python -m py_compile bot/bot.py && python -m py_compile bot/config.py && python -m py_compile bot/api_client.py && python -m py_compile bot/embeds.py
